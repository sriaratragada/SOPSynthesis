<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>SOPSynthesis</title>
    <style>
      :root {
        color-scheme: light dark;
        --accent: #ff5c35;
        --danger: #d93025;
      }
      body {
        width: 280px;
        margin: 0;
        padding: 16px;
        font-family: system-ui, sans-serif;
        font-size: 14px;
      }
      h1 {
        margin: 0 0 4px;
        font-size: 15px;
      }
      .health {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 12px;
        font-size: 12px;
        opacity: 0.85;
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #999;
        flex-shrink: 0;
      }
      .dot.up { background: #1e8e3e; }
      .dot.down { background: var(--danger); }
      .dot.rec { background: var(--danger); animation: pulse 1.2s ease-in-out infinite; }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }
      .controls {
        display: flex;
        gap: 8px;
      }
      .controls button {
        flex: 1;
        padding: 10px;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        color: #fff;
        background: var(--accent);
        cursor: pointer;
      }
      .controls button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .controls button.stop { background: var(--danger); }
      .controls button.pause { background: #b45309; }
      .controls button.hidden { display: none; }
      .hotkeys {
        margin-top: 10px;
        font-size: 11px;
        text-align: center;
        opacity: 0.6;
      }
      .status {
        margin-bottom: 12px;
        padding: 10px;
        border-radius: 8px;
        background: rgba(217, 48, 37, 0.08);
        font-size: 12px;
        display: none;
      }
      .status.visible { display: block; }
      .status .target {
        display: flex;
        align-items: center;
        gap: 6px;
        font-weight: 600;
        margin-bottom: 6px;
      }
      .status .target span:last-child {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .status .row {
        display: flex;
        justify-content: space-between;
        opacity: 0.85;
        margin-top: 3px;
      }
      .status .last-action {
        margin-top: 6px;
        opacity: 0.7;
        font-style: italic;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .warn {
        margin-top: 10px;
        padding: 8px;
        border-radius: 6px;
        background: rgba(245, 158, 11, 0.15);
        font-size: 12px;
        display: none;
      }
      .warn.visible { display: block; }
      .error {
        margin-top: 10px;
        font-size: 12px;
        color: var(--danger);
      }
      .hidden { display: none; }
    </style>
  </head>
  <body>
    <h1>SOPSynthesis</h1>
    <div class="health">
      <span id="health-dot" class="dot"></span>
      <span id="health-text">Checking backend…</span>
    </div>

    <div id="status" class="status">
      <div class="target">
        <span class="dot rec"></span>
        <span id="status-tab">Recording</span>
      </div>
      <div class="row"><span>Steps captured</span><b id="status-steps">0</b></div>
      <div class="row"><span>Elapsed</span><b id="status-elapsed">0:00</b></div>
      <div id="status-last" class="last-action"></div>
    </div>

    <div class="controls">
      <button id="pause" class="pause hidden">Pause</button>
      <button id="toggle" disabled>Start recording</button>
    </div>
    <div class="hotkeys">Alt+Shift+S start/stop &nbsp;·&nbsp; Alt+Shift+P pause</div>

    <div id="warn-page" class="warn"></div>
    <div id="warn-start" class="warn"></div>
    <div id="warn-queue" class="warn"></div>
    <div id="warn-capture" class="warn"></div>
    <div id="error" class="error hidden"></div>
    <div id="version" class="hotkeys"></div>
    <script type="module" src="/src/popup/main.ts"></script>
  </body>
</html>
